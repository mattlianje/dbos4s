version = 3.10.3
runner.dialect = scala3
docstrings.style = keep
docstrings.wrap = false
maxColumn = 100
indent.main = 2
indent.callSite = 2
indent.defnSite = 2
align.preset = more
align.openParenCallSite = false

# Never format Mill's generated/unpacked sources (e.g. the zinc compiler-bridge
# sources unpacked per Scala version under out/ once the 2.12 cross is built).
project.excludePaths = ["glob:**/out/**"]
